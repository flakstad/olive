# Olive hot reload config for the local tool example.
package=.
runtime=../../../src/olive_reload
state=Tool_State
run=run
init=init
on_load=on_load
# State layout changes require restarting olive run.
# Any olive watch process can stay running.
on_layout_change=reject
module_name=hot_reload_local_tool
watch=..
watch_debounce_ms=150
generated_dir=../.olive/reload/generated
build_dir=../.olive/reload/build
