# Olive hot reload config for the HTTP server example.
package=.
runtime=../../../src/probe_reload
state=Server_State
run=run
init=init
on_load=on_load
on_unload=on_unload
# State layout changes require restarting olive run.
# Any olive watch process can stay running.
on_layout_change=reject
module_name=hot_reload_http_server
watch=..
watch_debounce_ms=150
generated_dir=../.probe/reload/generated
build_dir=../.probe/reload/build
