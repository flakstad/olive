# Olive hot reload config for the Raylib example.
#
# package: reload adapter package. This config lives beside reload.odin, so "." is the adapter.
package=.
#
# runtime: Olive reload runtime package.
runtime=../../../src/probe_reload
#
# state: one durable root state type owned by the resident host.
state=Game_State
#
# run: reloadable entry point from reload.odin. Olive calls it repeatedly.
run=run
#
# Optional lifecycle hooks from reload.odin.
init=init
on_load=on_load
on_unload=on_unload
force_reload=force_reload
force_restart=force_restart
#
# Host-owned resources live in the resident host, not in reload generations.
host_init=host_init
host_shutdown=host_shutdown
#
# State layout changes require restarting olive run.
# Any olive watch process can stay running.
on_layout_change=reject
#
# Generated files and outputs are kept outside the source package.
module_name=hot_reload_raylib
watch=..
watch_debounce_ms=150
#
# Raylib must be shared for hot reload so the host and reload module do not
# each statically link their own GLFW/Raylib globals.
odin_args=-define:RAYLIB_SHARED=true
generated_dir=../.probe/reload/generated
build_dir=../.probe/reload/build
